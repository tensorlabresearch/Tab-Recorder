<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Meeting Notes Workspace</title>
    <link rel="stylesheet" href="notes_page.css" />
  </head>
  <body>
    <main class="page" data-transcription-ui="off">
      <header class="top">
        <h1>Meeting Notes Workspace</h1>
        <p>Your recorded meetings, notes, and Drive links.</p>
      </header>
      <section class="toolbar">
        <input id="search" type="text" placeholder="Search by meeting name or note text" />
        <button id="refresh">Refresh</button>
        <div id="recorder-sync" class="recorder-sync"></div>
        <div id="status" class="status-text"></div>
      </section>
      <section id="sessions" class="sessions"></section>
    </main>
    <script type="module" src="notes_page.js"></script>
  </body>
</html>
