name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test

      - name: Validate version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          MANIFEST_VERSION=$(node -e "console.log(require('./projects/tab-recorder-v2/manifest.json').version)")
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "Tag v$TAG does not match manifest.json version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Package extension
        run: |
          cd projects/tab-recorder-v2
          zip -r ../../tab-recorder-v2.zip . \
            -x 'node_modules/*' \
            -x '.DS_Store' \
            -x '*.md'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: tab-recorder-v2.zip
          generate_release_notes: true
