<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" role="img" aria-label="Tab Recorder">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#3d050d"/>
      <stop offset="55%" stop-color="#160508"/>
      <stop offset="100%" stop-color="#0a0204"/>
    </radialGradient>
    <linearGradient id="jelly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8092"/>
      <stop offset="45%" stop-color="#ff5566"/>
      <stop offset="100%" stop-color="#ef233c"/>
    </linearGradient>
  </defs>

  <!-- near-black rounded-square background with a soft red core glow -->
  <rect x="2" y="2" width="124" height="124" rx="28" fill="url(#bg)"/>
  <rect x="2.5" y="2.5" width="123" height="123" rx="27.5" fill="none" stroke="#b61225" stroke-width="2" opacity="0.6"/>

  <!-- record ring: open at the top where the REC bead sits -->
  <circle cx="64" cy="66" r="46" fill="none" stroke="#ef233c" stroke-width="5"
          stroke-linecap="round" stroke-dasharray="255 34" transform="rotate(-100 64 66)" opacity="0.92"/>

  <!-- REC bead riding the ring at 12 o'clock -->
  <circle cx="64" cy="20" r="8.5" fill="#ff5566"/>
  <circle cx="64" cy="20" r="8.5" fill="none" stroke="#ff8092" stroke-width="1.5" opacity="0.8"/>

  <!-- jellyfish, centered inside the ring -->
  <g>
    <!-- bell -->
    <path fill="url(#jelly)"
          d="M42 70
             C42 44 86 44 86 70
             C86 73 83.5 74.5 80.5 73.6
             C78 78 74 78 71.5 73.6
             C69 78 65 78 64 73.6
             C63 78 59 78 56.5 73.6
             C54 78 50 78 47.5 73.6
             C44.5 74.5 42 73 42 70 Z"/>
    <!-- bell highlight -->
    <path fill="#ffd0d8" opacity="0.5"
          d="M52 54 C54 49 60 47 64 47 C61 50 58 53 56 58 C54 58 52 57 52 54 Z"/>
    <!-- tentacles -->
    <g fill="none" stroke="url(#jelly)" stroke-width="3.4" stroke-linecap="round">
      <path d="M49 76 q-3 8 1 15 q3 7 -1 14"/>
      <path d="M57 77 q-2 9 1 16 q2 7 -1 13"/>
      <path d="M64 77 q1 9 -0.5 17 q-1 7 0.5 13"/>
      <path d="M71 77 q2 9 -1 16 q-2 7 1 13"/>
      <path d="M79 76 q3 8 -1 15 q-3 7 1 14"/>
    </g>
  </g>
</svg>
