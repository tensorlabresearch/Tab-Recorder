<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Tab Recorder</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <main class="panel">
      <header class="panel-header">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"></div>
          <div class="brand-text">
            <div class="brand-name">Tab Recorder</div>
            <div class="brand-subtitle">Audio capture for tabs and mic</div>
          </div>
        </div>
      </header>

      <section id="loading-splash" class="loading-splash">
        <div class="loading-logo">Tab Recorder</div>
        <div class="loading-subtitle">Loading...</div>
      </section>

      <section id="pre-record" class="card">
        <div class="card-section">
          <div class="field">
            <label class="label" for="meeting-label">Recording Name</label>
            <input id="meeting-label" type="text" autocomplete="off" />
          </div>
          <div class="field">
            <label class="label" for="mic-select">Microphone</label>
            <select id="mic-select"></select>
          </div>
          <div class="folder-status">
            <div class="folder-status-text">
              <span class="folder-status-label">Recordings folder</span>
              <span id="folder-name" class="folder-name">Not granted</span>
            </div>
            <button id="pick-folder-btn" class="text-button" type="button">Pick Folder</button>
          </div>
        </div>

        <div id="status" class="message"></div>

        <div class="actions">
          <button id="start-btn" class="primary">Start Recording</button>
          <button id="open-settings-btn" class="ghost">Settings</button>
        </div>
      </section>

      <section id="recording" class="card recording hidden">
        <div class="record-hero">
          <div class="record-status">
            <span class="rec-dot" aria-hidden="true"></span>
            <span id="recording-status" class="record-label">Recording</span>
          </div>
          <div id="elapsed" class="elapsed">00:00</div>
        </div>

        <div class="meters">
          <div class="meter-row">
            <span class="meter-label">Tab</span>
            <div class="meter-bar"><div id="tab-level" class="meter-fill"></div></div>
          </div>
          <div class="meter-row">
            <span class="meter-label">Mic</span>
            <div class="meter-bar"><div id="mic-level" class="meter-fill"></div></div>
          </div>
        </div>

        <div class="card-section is-bordered">
          <div class="field">
            <label class="label" for="mic-select-live">Microphone</label>
            <select id="mic-select-live"></select>
          </div>
        </div>

        <div class="actions">
          <button id="pause-btn" class="ghost">Pause</button>
          <button id="change-tab-btn" class="ghost">Change Tab</button>
          <button id="stop-btn" class="danger">Stop Recording</button>
        </div>
      </section>

      <section id="recordings-section" class="recordings-section">
        <div class="recordings-header">
          <h2 class="recordings-title">Recordings</h2>
          <div class="recordings-header-actions">
            <button id="open-folder-btn" class="text-button" type="button">Open Folder</button>
            <button id="refresh-recordings-btn" class="text-button" type="button">Refresh</button>
          </div>
        </div>
        <div id="recordings-list" class="recordings-list">
          <div class="recordings-empty">No recordings yet.</div>
        </div>
      </section>
    </main>

    <script type="module" src="panel.js"></script>
  </body>
</html>
